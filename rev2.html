<!DOCTYPE html>
<html>
<head>
<title>Layout Designer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{--bg:#e2e8f0;--toolbar:#1a202c;--panel:#f8f9fa;--border:#ddd;--text:#2d3748;--subtext:#718096;--canvas-bg:#cbd5e0;--card:white;}
body.dark-mode{--bg:#0a0f1e;--toolbar:#060b18;--panel:#0d1526;--border:#1e2d4a;--text:#c8deff;--subtext:#6b8cbe;--canvas-bg:#0d1a35;--card:#0f1d38;}
*{box-sizing:border-box;}
body{font-family:'Segoe UI',sans-serif;margin:0;background:var(--bg);display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.toolbar{background:var(--toolbar);color:white;padding:8px 14px 14px;display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;box-shadow:0 4px 10px rgba(0,0,0,0.3);z-index:10;width:100%;overflow-y:auto;overflow-x:hidden;height:56px;position:relative;transition:height 0.22s ease;}
.toolbar.expanded{height:var(--tb-h,260px);}
.toolbar-handle{position:absolute;bottom:0;left:0;right:0;height:8px;cursor:ns-resize;background:rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:center;z-index:20;}
.toolbar-handle::after{content:'';width:44px;height:3px;background:rgba(255,255,255,0.28);border-radius:2px;}
.toolbar-handle:hover{background:rgba(99,179,237,0.2);}
.tb-btn{background:#2d3748;color:#a0aec0;border:none;border-radius:4px;padding:5px 10px;font-size:11px;cursor:pointer;font-weight:bold;white-space:nowrap;}
.tb-btn:hover{background:#4a5568;color:white;}
.input-group{display:flex;flex-direction:column;gap:3px;}
label{font-size:9px;text-transform:uppercase;color:#a0aec0;font-weight:bold;}
input,select{padding:5px;border-radius:4px;border:1px solid #4a5568;background:#2d3748;color:white;font-size:12px;}
input[type=number]{width:62px;}
button{padding:7px 12px;border:none;border-radius:4px;cursor:pointer;font-weight:bold;transition:0.15s;font-size:12px;}
button:hover{filter:brightness(1.15);}
.btn-green{background:#38a169;color:white;}.btn-red{background:#e53e3e;color:white;}.btn-gray{background:#718096;color:white;}.btn-purple{background:#805ad5;color:white;}.btn-teal{background:#319795;color:white;}
.sep{width:1px;height:30px;background:#4a5568;margin:0 4px;align-self:center;flex-shrink:0;}
.main-content{display:flex;flex-grow:1;overflow:hidden;}
#canvas-container{flex-grow:1;display:flex;justify-content:center;align-items:center;padding:40px;overflow:auto;background:var(--canvas-bg);position:relative;}
.canvas-wrapper{position:relative;box-shadow:0 20px 50px rgba(0,0,0,0.25);background:white;border:2px solid #333;}
.canvas-wrapper.over-limit{border-color:#e53e3e!important;box-shadow:0 0 0 3px rgba(229,62,62,0.35),0 20px 50px rgba(0,0,0,0.25)!important;}
body.dark-mode .canvas-wrapper{box-shadow:0 20px 60px rgba(0,150,255,0.1),0 0 0 1px #1e3a6e;}
.right-panel{width:268px;background:var(--panel);border-left:1px solid var(--border);padding:14px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;z-index:5;}
.panel-title{font-size:13px;color:var(--text);border-bottom:2px solid var(--border);padding-bottom:7px;font-weight:bold;}
.component-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:7px;}
.component-item{background:var(--card);padding:10px;border-radius:8px;box-shadow:0 2px 5px rgba(0,0,0,0.08);border:1px solid var(--border);}
.component-header{font-weight:bold;font-size:12px;color:var(--text);margin-bottom:5px;display:flex;justify-content:space-between;align-items:center;}
.component-details{font-size:11px;color:var(--subtext);display:flex;flex-direction:column;gap:3px;}
.detail-row{display:flex;justify-content:space-between;align-items:center;}
.detail-label{font-weight:600;color:var(--text);font-size:10px;}
.angle-input,.mini-input{padding:3px;border:1px solid var(--border);border-radius:4px;background:var(--card);color:var(--text);}
.angle-input{width:48px;text-align:right;}.mini-input{width:46px;}
body.dark-mode .mini-input,body.dark-mode .angle-input{background:#0d1a35;border-color:#1e3a6e;color:#c8deff;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;justify-content:center;align-items:center;}
.modal-overlay.active{display:flex;}
.modal-box{background:#1a202c;border-radius:14px;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,0.6);max-width:95vw;max-height:90vh;display:flex;flex-direction:column;gap:14px;}
.modal-tab{padding:7px 16px;border-radius:6px;border:none;cursor:pointer;font-weight:bold;font-size:12px;background:#2d3748;color:#a0aec0;}
.modal-tab.active{background:#3182ce;color:white;}
.modal-close{align-self:flex-end;background:#e53e3e;color:white;border:none;border-radius:6px;padding:7px 16px;cursor:pointer;font-weight:bold;}
.import-info{background:#2d3748;border-radius:8px;padding:12px;font-size:12px;color:#a0aec0;line-height:1.7;}
.import-info strong{color:#63b3ed;}.import-info code{background:#4a5568;padding:2px 6px;border-radius:3px;font-family:monospace;color:#fbd38d;}
#csvInput{width:100%;height:100px;background:#2d3748;color:#e2e8f0;border:1px solid #4a5568;border-radius:6px;padding:10px;font-family:monospace;font-size:12px;resize:vertical;}
.import-preview{background:#2d3748;border-radius:6px;padding:8px;font-size:11px;color:#a0aec0;max-height:110px;overflow-y:auto;}
.preview-row{display:flex;gap:12px;padding:3px 0;border-bottom:1px solid #4a5568;}
.preview-row.header{color:#63b3ed;font-weight:bold;}.preview-error{color:#fc8181;}
.snap-hint{position:fixed;background:#38a169;color:white;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:bold;pointer-events:none;z-index:500;display:none;}
</style>
</head>
<body>
<div class="snap-hint" id="snapHint">⊕ Snap</div>
<div class="toolbar" id="toolbar">
  <button class="tb-btn" id="tbToggle" onclick="toggleTB()" style="align-self:center;flex-shrink:0;">▼ Expand</button>
  <div class="sep"></div>
  <div class="input-group">
    <label>Room Limit W × D (mm)</label>
    <div style="display:flex;gap:3px;">
      <input type="number" id="roomW" value="12000" onchange="updateRoomLimit()">
      <input type="number" id="roomD" value="8000"  onchange="updateRoomLimit()">
    </div>
  </div>
  <div class="sep"></div>
  <div class="input-group">
    <label style="display:flex;align-items:center;justify-content:space-between;">Library
      <button onclick="openImport()" style="background:#38a169;color:white;border:none;border-radius:3px;padding:1px 6px;font-size:11px;cursor:pointer;margin-left:4px;">＋</button>
    </label>
    <select id="presetSelect" onchange="loadPreset()" style="width:118px;"></select>
  </div>
  <div class="input-group"><label>Model</label><input type="text" id="compModel" value="Custom" style="width:74px;"></div>
  <div class="input-group">
    <label>Shape</label>
    <select id="compShape" onchange="toggleShapeInputs()" style="width:74px;">
      <option value="rect">Box</option>
      <option value="circle">Round</option>
    </select>
  </div>
  <div class="input-group">
    <label id="sizeLabel">L × W × H (mm)</label>
    <div style="display:flex;gap:3px;">
      <input type="number" id="compL" value="1500">
      <span id="widthGroup"><input type="number" id="compW" value="1000"></span>
      <input type="number" id="compH" value="1000">
    </div>
  </div>
  <div class="input-group"><label>Clearance</label><input type="number" id="clearanceAll" value="1000" style="width:68px;" oninput="updateAllClearances()"></div>
  <button class="btn-green" onclick="addCompressor()">＋ Add</button>
  <button class="btn-gray"  onclick="duplicateSelected()" title="Ctrl+D">⎘ Dup</button>
  <button class="btn-red"   onclick="deleteSelected()">✕ Del</button>
  <div class="sep"></div>
  <div class="input-group">
    <label>Pipe Type</label>
    <select id="pipeType" style="width:96px;">
      <option value="air">Air (Blue)</option>
      <option value="water">Water (Teal)</option>
      <option value="electrical">Electric (Orange)</option>
      <option value="gas">Gas (Red)</option>
    </select>
  </div>
  <div class="input-group">
    <label>Size</label>
    <select id="pipeThick" style="width:60px;">
      <option value="4">Light</option>
      <option value="7" selected>Med</option>
      <option value="11">Heavy</option>
    </select>
  </div>
  <div class="input-group">
    <label>Piping <span style="color:#718096;font-size:8px;">[Esc]=exit</span></label>
    <button id="btn-draw-pipe" onclick="togglePipeMode()" style="width:100px;padding:6px;background:#2b6cb0;color:white;border:none;border-radius:4px;cursor:pointer;font-weight:bold;font-size:11px;">Draw Pipe</button>
  </div>
  <div class="sep"></div>
  <button class="btn-gray" onclick="doUndo()" title="Ctrl+Z">↶ Undo</button>
  <button class="btn-purple" onclick="openViews()">📐 Views</button>
  <button class="btn-gray"   onclick="printPDF()">🖨 PDF</button>
  <div class="sep"></div>
  <button class="btn-teal" onclick="toggleDimensions()">📏 Dims</button>
  <button class="btn-teal" onclick="toggleGrid()">⊞ Grid</button>
  <button id="btnDark" onclick="toggleDark()" style="background:#4a5568;color:white;padding:7px 12px;border-radius:4px;font-weight:bold;font-size:12px;">🌙 Blueprint</button>
  <div class="input-group"><label>Grid (mm)</label><input type="number" id="gridSize" value="1000" onchange="redrawAll()" style="width:62px;"></div>
  <div class="toolbar-handle" id="tbHandle"></div>
</div>
<div class="main-content">
  <div id="canvas-container">
    <div class="canvas-wrapper" id="canvasWrapper"><canvas id="mainCanvas"></canvas></div>
  </div>
  <div class="right-panel">
    <div class="panel-title">Components</div>
    <ul class="component-list" id="componentList"></ul>
    <div style="display:none;">
      <input type="number" id="sT" value="1000"><input type="number" id="sB" value="1000">
      <input type="number" id="sL" value="1000"><input type="number" id="sR" value="1000">
    </div>
  </div>
</div>
<div class="modal-overlay" id="viewsModal">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <span style="color:white;font-size:17px;font-weight:bold;">Equipment Views</span>
      <button class="modal-close" onclick="closeViews()">✕ Close</button>
    </div>
    <div style="display:flex;gap:8px;">
      <button class="modal-tab active" id="tab-elev" onclick="switchTab('elevation')">📏 Elevation</button>
      <button class="modal-tab" id="tab-iso"  onclick="switchTab('iso')">📦 Isometric</button>
    </div>
    <div style="background:white;border-radius:8px;overflow:hidden;flex:1;"><canvas id="viewCanvas"></canvas></div>
  </div>
</div>
<div class="modal-overlay" id="importModal">
  <div class="modal-box" style="min-width:430px;max-width:520px;">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <span style="color:white;font-size:15px;font-weight:bold;">📥 Import Equipment Models</span>
      <button class="modal-close" onclick="closeImport()">✕</button>
    </div>
    <div class="import-info">
      <strong>⚠ Only 2 columns accepted:</strong><br>
      <code>Model</code> &nbsp;|&nbsp; <code>Dimension (LxWxH), mm</code><br><br>
      Separator: tab, comma, or semicolon. 2 values = circular (Dia×H), 3 values = rectangular.
    </div>
    <textarea id="csvInput" placeholder="EG-22&#9;1250x850x1000&#10;AT-500&#9;650x1200"></textarea>
    <div id="importPreview" class="import-preview" style="display:none;"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button onclick="previewImport()" style="background:#3182ce;color:white;border:none;border-radius:6px;padding:8px 16px;cursor:pointer;font-weight:bold;">👁 Preview</button>
      <button onclick="confirmImport()" style="background:#38a169;color:white;border:none;border-radius:6px;padding:8px 16px;cursor:pointer;font-weight:bold;">✅ Import</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// GLOBALS
// ═══════════════════════════════════════════════
let SC=0.08;
let canvas=new fabric.Canvas('mainCanvas',{backgroundColor:'#ffffff',preserveObjectStacking:true});
let gridVisible=true,dimsVisible=true,isDarkMode=false;
let components=[];
let alignLines=[],roomDimObjs=[],clusterDimObjs=[],limitObjs=[];
let roomLimitW=12000,roomLimitD=8000;
let currentTab='elevation';
let viewCtx,viewCvs;
const SNAP_ROT=5,DEF_COLOR='#a0adb8';

const PIPE_COLORS={
  air:{s:'#2b6cb0',h:'#63b3ed'},
  water:{s:'#2c7a7b',h:'#81e6d9'},
  electrical:{s:'#c05621',h:'#fbd38d'},
  gas:{s:'#9b2c2c',h:'#fc8181'},
};

let machineLib=[
  {name:"Custom...",model:"",shape:"rect",L:1500,W:1000,H:1000,T:1000,B:1000,lS:1000,rS:1000},
  {name:"30HP (EG-22)",model:"EG-22",shape:"rect",L:1250,W:850,H:1000,T:800,B:800,lS:600,rS:600},
  {name:"50HP (EG-37)",model:"EG-37",shape:"rect",L:1500,W:1000,H:1000,T:800,B:800,lS:800,rS:800},
  {name:"75HP (EG-55)",model:"EG-55",shape:"rect",L:1900,W:1200,H:1000,T:1000,B:1000,lS:800,rS:800},
  {name:"100HP (EG-75)",model:"EG-75",shape:"rect",L:2200,W:1350,H:1000,T:1000,B:1000,lS:1000,rS:1000},
  {name:"500L Tank",model:"AT500",shape:"circle",L:650,W:650,H:1000,T:600,B:600,lS:600,rS:600},
  {name:"1000L Tank",model:"AT1000",shape:"circle",L:850,W:850,H:1200,T:700,B:700,lS:700,rS:700},
  {name:"2000L Tank",model:"AT2000",shape:"circle",L:1100,W:1100,H:1500,T:800,B:800,lS:800,rS:800},
  {name:"Dryer (D-100)",model:"D-100",shape:"rect",L:800,W:600,H:1000,T:500,B:500,lS:500,rS:500},
];

// ═══════════════════════════════════════════════
// TOOLBAR
// ═══════════════════════════════════════════════
let tbExpanded=false;
function toggleTB(){
  tbExpanded=!tbExpanded;
  document.getElementById('toolbar').classList.toggle('expanded',tbExpanded);
  document.getElementById('tbToggle').textContent=tbExpanded?'▲ Collapse':'▼ Expand';
}
(()=>{
  const tb=document.getElementById('toolbar'),h=document.getElementById('tbHandle');
  let drag=false,sy=0,sh=0;
  h.addEventListener('mousedown',e=>{drag=true;sy=e.clientY;sh=tb.offsetHeight;document.body.style.userSelect='none';e.preventDefault();});
  document.addEventListener('mousemove',e=>{
    if(!drag)return;
    const nh=Math.max(52,Math.min(420,sh+(e.clientY-sy)));
    tb.style.setProperty('--tb-h',nh+'px');tb.style.height=nh+'px';
    const exp=nh>60;tb.classList.toggle('expanded',exp);tbExpanded=exp;
    document.getElementById('tbToggle').textContent=exp?'▲ Collapse':'▼ Expand';
  });
  document.addEventListener('mouseup',()=>{drag=false;document.body.style.userSelect='';});
})();

// ═══════════════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════════════
let hist=[],undoing=false;
function getState(){
  return JSON.stringify({
    machines:canvas.getObjects().filter(o=>o.isMachine).map(o=>o.toJSON(['id','isMachine','compData','machineHitData'])),
    pipes:pipes.map(p=>({absPoints:p.absPoints,pipeData:p.pipeData}))
  });
}
function saveHist(){
  if(undoing)return;
  const s=getState();
  if(hist.length&&hist[hist.length-1]===s)return;
  if(hist.length>25)hist.shift();
  hist.push(s);
}
canvas.on('object:added',e=>{if(e.target&&e.target.isMachine)saveHist();});
canvas.on('object:modified',e=>{if(e.target&&e.target.isMachine)saveHist();});
canvas.on('object:removed',e=>{if(e.target&&e.target.isMachine)saveHist();});

// ═══════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='d'){e.preventDefault();duplicateSelected();}
  if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();doUndo();}
  if((e.key==='Delete'||e.key==='Backspace')&&!['INPUT','TEXTAREA'].includes(e.target.tagName))deleteSelected();
  if(e.key==='Escape'){if(isPipingMode)exitPipeMode();canvas.discardActiveObject();canvas.renderAll();}
});

// ═══════════════════════════════════════════════
// ROOM LIMIT
// ═══════════════════════════════════════════════
function updateRoomLimit(){
  roomLimitW=parseFloat(document.getElementById('roomW').value)||12000;
  roomLimitD=parseFloat(document.getElementById('roomD').value)||8000;
  checkLimit();drawLimitOverlay();
}
function checkLimit(){
  let over=false;
  canvas.getObjects().filter(o=>o.isMachine).forEach(obj=>{
    const b=obj.getBoundingRect(true,true);
    if(b.left/SC<0||b.top/SC<0||(b.left+b.width)/SC>roomLimitW||(b.top+b.height)/SC>roomLimitD)over=true;
  });
  document.getElementById('canvasWrapper').classList.toggle('over-limit',over);
}
function drawLimitOverlay(){
  limitObjs.forEach(o=>canvas.remove(o));limitObjs=[];
  const lW=roomLimitW*SC,lD=roomLimitD*SC,cW=canvas.width,cH=canvas.height;
  const border=new fabric.Rect({left:0,top:0,width:lW,height:lD,fill:'transparent',stroke:'rgba(229,62,62,0.6)',strokeWidth:2,strokeDashArray:[8,5],selectable:false,evented:false,excludeFromExport:true});
  canvas.add(border);limitObjs.push(border);
  if(lW<cW){const sh=new fabric.Rect({left:lW,top:0,width:cW-lW,height:cH,fill:'rgba(229,62,62,0.05)',selectable:false,evented:false,excludeFromExport:true});canvas.add(sh);limitObjs.push(sh);}
  if(lD<cH){const sh=new fabric.Rect({left:0,top:lD,width:lW,height:cH-lD,fill:'rgba(229,62,62,0.05)',selectable:false,evented:false,excludeFromExport:true});canvas.add(sh);limitObjs.push(sh);}
  canvas.renderAll();
}

// ═══════════════════════════════════════════════
// ████  PIPE SYSTEM  ████
//
// Each pipe = { absPoints[], pipeData{}, fabricPath, handleObjs[], cornerDots[] }
// absPoints = absolute canvas-px coords of the polyline vertices
// handles   = midpoint drag handles on each segment (blue squares)
// cornerDots = red circles at each bend point — also act as snap targets
//
// Rendering: fresh fabric.Path (objectCaching:false) every geometry change.
// No vertical "legs" — the route is purely flat (2D plan view only).
// ═══════════════════════════════════════════════
let pipes=[];
let previewPath=null;

// ── SVG path builder ──
function ptsToSVG(pts){
  if(!pts||pts.length<2)return 'M 0 0 L 0 0';
  return pts.map((p,i)=>`${i===0?'M':'L'} ${p.x.toFixed(2)} ${p.y.toFixed(2)}`).join(' ');
}

// ── Create/replace the fabric.Path for a pipe ──
function makePipePath(pts,pipeData,isPreview){
  const pc=PIPE_COLORS[pipeData.type]||PIPE_COLORS.air;
  const thick=pipeData.thick||7;
  return new fabric.Path(ptsToSVG(pts),{
    fill:null,
    stroke:isPreview?pc.h:pc.s,
    strokeWidth:isPreview?Math.max(2,thick*0.5):thick,
    strokeLineCap:'round',
    strokeLineJoin:'round',
    strokeDashArray:isPreview?[10,6]:null,
    selectable:false,evented:false,
    objectCaching:false,
    excludeFromExport:!!isPreview,
    opacity:isPreview?0.65:1,
  });
}

function refreshPipeFabric(pipe){
  if(pipe.fabricPath)canvas.remove(pipe.fabricPath);
  pipe.fabricPath=makePipePath(pipe.absPoints,pipe.pipeData,false);
  canvas.add(pipe.fabricPath);
  // Keep pipes behind machines and handles
  bringOverlaysToFront();
}

function refreshAllPipes(){pipes.forEach(p=>{refreshPipeFabric(p);refreshPipeHandles(p);});}

// ── Bring all overlay items to front in correct z order ──
function bringOverlaysToFront(){
  // pipes already added; bring machines above pipes
  canvas.getObjects().filter(o=>o.isMachine).forEach(m=>canvas.bringToFront(m));
  // handles above machines
  pipes.forEach(p=>{
    if(p.handleObjs)p.handleObjs.forEach(h=>canvas.bringToFront(h));
    if(p.cornerDots)p.cornerDots.forEach(d=>canvas.bringToFront(d));
  });
  // port dots topmost
  portDots.forEach(d=>canvas.bringToFront(d));
}

// ═══════════════════════════════════════════════
// ORTHOGONAL ROUTER (draw.io style, 2D only)
// ═══════════════════════════════════════════════
const STUB=40;
const DIR_VEC={top:{x:0,y:-1},bottom:{x:0,y:1},left:{x:-1,y:0},right:{x:1,y:0}};

function orthoRoute(p1,dir1,p2,dir2){
  const d1=DIR_VEC[dir1],d2=DIR_VEC[dir2];
  const s1={x:p1.x+d1.x*STUB,y:p1.y+d1.y*STUB};
  const s2={x:p2.x+d2.x*STUB,y:p2.y+d2.y*STUB};
  const h1=dir1==='left'||dir1==='right';
  const h2=dir2==='left'||dir2==='right';
  let mids=[];
  if(h1&&h2){const mx=(s1.x+s2.x)/2;mids=[{x:mx,y:s1.y},{x:mx,y:s2.y}];}
  else if(!h1&&!h2){const my=(s1.y+s2.y)/2;mids=[{x:s1.x,y:my},{x:s2.x,y:my}];}
  else if(h1&&!h2){mids=[{x:s2.x,y:s1.y}];}
  else{mids=[{x:s1.x,y:s2.y}];}
  return dedupPts([p1,s1,...mids,s2,p2]);
}

function dedupPts(pts){
  const out=[pts[0]];
  for(let i=1;i<pts.length;i++){
    const prev=out[out.length-1],cur=pts[i];
    if(Math.abs(cur.x-prev.x)>0.5||Math.abs(cur.y-prev.y)>0.5)out.push(cur);
  }
  return out;
}

// ═══════════════════════════════════════════════
// CORNER DOTS + MIDPOINT HANDLES
// ═══════════════════════════════════════════════

/*  Corner dots (red) sit at every bend (interior points of the polyline).
    They are snappable targets — connecting a new pipe to them continues
    the run without a machine port.

    Midpoint handles (blue squares) sit at the midpoint of each segment.
    Dragging one slides that segment orthogonally (like draw.io segment-drag).
*/

let allCornerDots=[];   // {dot, pipe, ptIdx}  — for snap lookup

function clearPipeHandles(pipe){
  if(pipe.handleObjs){pipe.handleObjs.forEach(h=>canvas.remove(h));pipe.handleObjs=[];}
  if(pipe.cornerDots){
    pipe.cornerDots.forEach(d=>{
      canvas.remove(d);
      allCornerDots=allCornerDots.filter(e=>e.dot!==d);
    });
    pipe.cornerDots=[];
  }
}

function refreshPipeHandles(pipe){
  clearPipeHandles(pipe);
  const pts=pipe.absPoints;
  if(!pts||pts.length<2)return;
  pipe.handleObjs=[];
  pipe.cornerDots=[];

  // ── Corner dots at interior bend points ──
  for(let i=1;i<pts.length-1;i++){
    const p=pts[i];
    const dot=new fabric.Circle({
      left:p.x,top:p.y,radius:6,
      fill:'#e53e3e',stroke:'white',strokeWidth:2,
      originX:'center',originY:'center',
      selectable:false,evented:false,
      objectCaching:false,
      excludeFromExport:true,
      _isCornerDot:true,
    });
    canvas.add(dot);
    pipe.cornerDots.push(dot);
    allCornerDots.push({dot,pipe,ptIdx:i});
  }

  // ── Midpoint handles (blue squares) per segment ──
  for(let i=0;i<pts.length-1;i++){
    const a=pts[i],b=pts[i+1];
    const mx=(a.x+b.x)/2,my=(a.y+b.y)/2;
    const isHoriz=Math.abs(b.y-a.y)<1;
    const handle=new fabric.Rect({
      left:mx,top:my,width:12,height:12,
      fill:'rgba(49,130,206,0.85)',stroke:'white',strokeWidth:1.5,
      originX:'center',originY:'center',
      selectable:false,evented:false,
      hasBorders:false,hasControls:false,
      objectCaching:false,
      excludeFromExport:true,
      hoverCursor:isHoriz?'ns-resize':'ew-resize',
      _isSegHandle:true,
      _pipe:pipe,
      _segIdx:i,
      _isHoriz:isHoriz,
    });
    canvas.add(handle);
    pipe.handleObjs.push(handle);
  }
  bringOverlaysToFront();
}

function onHandleMove(handle){
  const pipe=handle._pipe;
  const i=handle._segIdx;
  const pts=pipe.absPoints;
  if(handle._isHoriz){
    // Horizontal segment: move Y of both endpoints
    const newY=handle.top;
    pts[i]={x:pts[i].x,y:newY};
    pts[i+1]={x:pts[i+1].x,y:newY};
  } else {
    // Vertical segment: move X of both endpoints
    const newX=handle.left;
    pts[i]={x:newX,y:pts[i].y};
    pts[i+1]={x:newX,y:pts[i+1].y};
  }
  pipe.absPoints=dedupPts(pts);
  // Live redraw path only (handles rebuilt on mouseup to keep drag smooth)
  if(pipe.fabricPath)canvas.remove(pipe.fabricPath);
  pipe.fabricPath=makePipePath(pipe.absPoints,pipe.pipeData,false);
  canvas.add(pipe.fabricPath);
  // Refresh corner dots live
  if(pipe.cornerDots){pipe.cornerDots.forEach(d=>canvas.remove(d));pipe.cornerDots=[];}
  const newPts=pipe.absPoints;
  for(let j=1;j<newPts.length-1;j++){
    const pp=newPts[j];
    const dot=new fabric.Circle({
      left:pp.x,top:pp.y,radius:6,fill:'#e53e3e',stroke:'white',strokeWidth:2,
      originX:'center',originY:'center',selectable:false,evented:false,
      objectCaching:false,excludeFromExport:true,_isCornerDot:true,
    });
    canvas.add(dot);
    pipe.cornerDots.push(dot);
    allCornerDots.push({dot,pipe,ptIdx:j});
  }
  bringOverlaysToFront();
  canvas.requestRenderAll();
}

function onHandleUp(handle){
  const pipe=handle._pipe;
  pipe.absPoints=dedupPts(pipe.absPoints);
  refreshPipeFabric(pipe);
  refreshPipeHandles(pipe);
  saveHist();
}

// ── Show/hide handles for selected pipe ──
let selectedPipe=null;
// Manual drag state for segment handles
let dragHandle=null; // {handle, pipe, segIdx, isHoriz, startMouseX, startMouseY, startPts}

function selectPipe(pipe){
  if(selectedPipe&&selectedPipe!==pipe)deselectPipe(selectedPipe);
  selectedPipe=pipe;
  refreshPipeHandles(pipe);
}
function deselectPipe(pipe){
  if(!pipe)return;
  clearPipeHandles(pipe);
  selectedPipe=null;
}
function deselectAllPipes(){if(selectedPipe)deselectPipe(selectedPipe);}

// ── Manual drag system for segment handles ──
// We intercept at the document level so Fabric never sees the mousedown
// when the user clicks a handle, preventing deselectAllPipes from firing.
let _dragActive=false;

document.addEventListener('mousedown',e=>{
  if(isPipingMode||!selectedPipe||!selectedPipe.handleObjs)return;
  // Convert raw client coords → canvas coords
  const ptr=clientToCanvas(e);
  for(const handle of selectedPipe.handleObjs){
    const dx=ptr.x-handle.left, dy=ptr.y-handle.top;
    if(Math.abs(dx)<12&&Math.abs(dy)<12){
      dragHandle={
        handle,
        pipe:selectedPipe,
        segIdx:handle._segIdx,
        isHoriz:handle._isHoriz,
        startMouseX:ptr.x,
        startMouseY:ptr.y,
        startPts:selectedPipe.absPoints.map(p=>({x:p.x,y:p.y})),
      };
      _dragActive=true;
      e.preventDefault();
      e.stopPropagation(); // block Fabric's mousedown entirely
      return;
    }
  }
},true); // capture phase — fires before Fabric

document.addEventListener('mousemove',e=>{
  if(!dragHandle||!_dragActive)return;
  const ptr=clientToCanvas(e);
  const{pipe,segIdx,isHoriz,startMouseX,startMouseY,startPts}=dragHandle;

  // Work from frozen startPts so there's no drift
  const pts=startPts.map(p=>({x:p.x,y:p.y}));
  const i=segIdx;

  if(isHoriz){
    // Horizontal segment → slide in Y only
    // Clamp: can't go past the previous or next bend point
    const rawY=startPts[i].y+(ptr.y-startMouseY);
    // Allow free movement along the axis (no clamping to pipe length —
    // user can extend the run; the stub handles the connection endpoints)
    pts[i]  ={x:pts[i].x,   y:rawY};
    pts[i+1]={x:pts[i+1].x, y:rawY};
  } else {
    // Vertical segment → slide in X only
    const rawX=startPts[i].x+(ptr.x-startMouseX);
    pts[i]  ={x:rawX, y:pts[i].y};
    pts[i+1]={x:rawX, y:pts[i+1].y};
  }

  pipe.absPoints=dedupPts(pts);

  // -- Live redraw: path --
  if(pipe.fabricPath)canvas.remove(pipe.fabricPath);
  pipe.fabricPath=makePipePath(pipe.absPoints,pipe.pipeData,false);
  canvas.add(pipe.fabricPath);

  // -- Live redraw: handle squares --
  pipe.handleObjs.forEach((h,hi)=>{
    const a=pipe.absPoints[hi], b=pipe.absPoints[hi+1];
    if(!a||!b)return;
    h.set({left:(a.x+b.x)/2, top:(a.y+b.y)/2});
    h.setCoords();
  });

  // -- Live redraw: corner dots --
  if(pipe.cornerDots){pipe.cornerDots.forEach(d=>canvas.remove(d));pipe.cornerDots=[];}
  allCornerDots=allCornerDots.filter(cd=>cd.pipe!==pipe);
  for(let j=1;j<pipe.absPoints.length-1;j++){
    const pp=pipe.absPoints[j];
    const dot=new fabric.Circle({
      left:pp.x,top:pp.y,radius:6,fill:'#e53e3e',stroke:'white',strokeWidth:2,
      originX:'center',originY:'center',selectable:false,evented:false,
      objectCaching:false,excludeFromExport:true,_isCornerDot:true,
    });
    canvas.add(dot); pipe.cornerDots.push(dot);
    allCornerDots.push({dot,pipe,ptIdx:j});
  }

  bringOverlaysToFront();
  canvas.requestRenderAll();
},true);

document.addEventListener('mouseup',e=>{
  if(!dragHandle||!_dragActive)return;
  _dragActive=false;
  const pipe=dragHandle.pipe;
  pipe.absPoints=dedupPts(pipe.absPoints);
  dragHandle=null;
  refreshPipeFabric(pipe);
  refreshPipeHandles(pipe);
  saveHist();
},true);

// Helper: raw client pos → canvas-space coords (respects zoom/pan)
function clientToCanvas(e){
  const rect=canvas.upperCanvasEl.getBoundingClientRect();
  const z=canvas.getZoom(), vpt=canvas.viewportTransform;
  return {
    x:(e.clientX-rect.left-vpt[4])/z,
    y:(e.clientY-rect.top -vpt[5])/z,
  };
}

// Click on pipe line to select it (Fabric mouse:down, fires only when no handle was hit)
canvas.on('mouse:down',opt=>{
  if(isPipingMode||_dragActive)return;
  if(opt.target&&opt.target.isMachine){deselectAllPipes();return;}
  const ptr=canvas.getPointer(opt.e);
  // If click is near a handle, don't deselect (capture phase already handled it)
  if(selectedPipe&&selectedPipe.handleObjs){
    for(const h of selectedPipe.handleObjs){
      if(Math.abs(ptr.x-h.left)<12&&Math.abs(ptr.y-h.top)<12)return;
    }
  }
  // Check click near a pipe segment
  let hit=null;
  pipes.forEach(pipe=>{
    if(!pipe.fabricPath)return;
    const pts=pipe.absPoints, thick=(pipe.pipeData.thick||7)+8;
    for(let i=0;i<pts.length-1;i++){
      if(distToSegment(ptr,pts[i],pts[i+1])<thick){hit=pipe;return;}
    }
  });
  if(hit)selectPipe(hit);
  else deselectAllPipes();
});

function distToSegment(p,a,b){
  const dx=b.x-a.x,dy=b.y-a.y;
  if(dx===0&&dy===0)return Math.hypot(p.x-a.x,p.y-a.y);
  const t=Math.max(0,Math.min(1,((p.x-a.x)*dx+(p.y-a.y)*dy)/(dx*dx+dy*dy)));
  return Math.hypot(p.x-(a.x+t*dx),p.y-(a.y+t*dy));
}

// ═══════════════════════════════════════════════
// SNAP TARGETS:  machine ports  +  corner dots
// ═══════════════════════════════════════════════
let portDots=[];

function getMachinePorts(m){
  const d=m.compData,mat=m.calcTransformMatrix();
  const rW=d.L*SC,rH=(d.shapeType==='circle'?d.L:d.W)*SC;
  const ox=((d.lS-d.rS)/2)*SC,oy=((d.T-d.B)/2)*SC;
  const hw=rW/2,hh=rH/2;
  return [
    {dir:'top',   lx:ox,   ly:oy-hh},
    {dir:'bottom',lx:ox,   ly:oy+hh},
    {dir:'left',  lx:ox-hw,ly:oy},
    {dir:'right', lx:ox+hw,ly:oy},
  ].map(lp=>{
    const abs=fabric.util.transformPoint({x:lp.lx,y:lp.ly},mat);
    return {machine:m,dir:lp.dir,x:abs.x,y:abs.y,isCorner:false};
  });
}

function buildPortDots(){
  destroyPortDots();
  canvas.getObjects().filter(o=>o.isMachine).forEach(m=>{
    getMachinePorts(m).forEach(port=>{
      const dot=new fabric.Circle({
        left:port.x,top:port.y,radius:6,fill:'#e53e3e',stroke:'white',strokeWidth:2,
        originX:'center',originY:'center',selectable:false,evented:false,
        objectCaching:false,excludeFromExport:true,_isPortDot:true,_portData:port,
      });
      canvas.add(dot);canvas.bringToFront(dot);
      portDots.push(dot);
    });
  });
  canvas.requestRenderAll();
}
function destroyPortDots(){portDots.forEach(d=>canvas.remove(d));portDots=[];}

function refreshPortDots(){
  if(!isPipingMode)return;
  portDots.forEach(dot=>{
    const p=dot._portData;
    const ports=getMachinePorts(p.machine);
    const updated=ports.find(pp=>pp.dir===p.dir);
    if(updated){dot._portData=updated;dot.set({left:updated.x,top:updated.y});}
  });
}

// Unified snap: returns {x,y,dir?,machine?,isCorner,ptIdx?,pipe?}
function nearestSnap(x,y,radius=26){
  let best=null,bestD=radius;

  // 1. Machine ports
  portDots.forEach(dot=>{
    const p=dot._portData;
    const d=Math.hypot(p.x-x,p.y-y);
    if(d<bestD){bestD=d;best={x:p.x,y:p.y,dir:p.dir,machine:p.machine,isCorner:false};}
  });

  // 2. Corner dots (bend points) — only in pipe mode and when not starting
  if(isPipingMode){
    allCornerDots.forEach(({dot,pipe,ptIdx})=>{
      const cx=dot._portData?dot._portData.x:dot.left;
      const cy=dot._portData?dot._portData.y:dot.top;
      // Use the actual stored point position
      const pp=pipe.absPoints[ptIdx];
      const d=Math.hypot(pp.x-x,pp.y-y);
      if(d<bestD){
        bestD=d;
        // infer direction from segments either side
        const pts=pipe.absPoints;
        const prev=pts[ptIdx-1],next=pts[ptIdx+1];
        let dir='right';
        if(next){
          const dx=next.x-pp.x,dy=next.y-pp.y;
          if(Math.abs(dx)>Math.abs(dy))dir=dx>0?'right':'left';
          else dir=dy>0?'bottom':'top';
        }
        best={x:pp.x,y:pp.y,dir,isCorner:true,pipe,ptIdx};
      }
    });
  }
  return best;
}

function highlightSnap(snap){
  portDots.forEach(dot=>{
    const p=dot._portData;
    const isTarget=snap&&!snap.isCorner&&p.machine===snap.machine&&p.dir===snap.dir;
    dot.set({radius:isTarget?9:6,fill:isTarget?'#38a169':'#e53e3e'});
  });
  allCornerDots.forEach(({dot,pipe,ptIdx})=>{
    const pp=pipe.absPoints[ptIdx];
    const isTarget=snap&&snap.isCorner&&snap.pipe===pipe&&snap.ptIdx===ptIdx;
    dot.set({radius:isTarget?9:6,fill:isTarget?'#38a169':'#e53e3e'});
  });
  canvas.requestRenderAll();
}

// ═══════════════════════════════════════════════
// PIPING MODE
// ═══════════════════════════════════════════════
let isPipingMode=false;
let startNode=null; // {x,y,dir,machine?,isCorner?,pipe?,ptIdx?}

function togglePipeMode(){isPipingMode?exitPipeMode():enterPipeMode();}

function enterPipeMode(){
  isPipingMode=true;
  document.getElementById('btn-draw-pipe').style.background='#38a169';
  document.getElementById('btn-draw-pipe').textContent='Cancel Pipe';
  canvas.defaultCursor='crosshair';
  canvas.selection=false;
  deselectAllPipes();
  canvas.getObjects().forEach(o=>{if(o.isMachine)o.set({selectable:false,evented:false});});
  buildPortDots();
  // Rebuild corner dots on all existing pipes so they are snappable
  rebuildAllCornerDots();
}

function rebuildAllCornerDots(){
  // Remove any stale corner dot canvas objects and clear the registry
  allCornerDots.forEach(({dot})=>canvas.remove(dot));
  allCornerDots=[];
  pipes.forEach(pipe=>{
    if(pipe.cornerDots)pipe.cornerDots.forEach(d=>canvas.remove(d));
    pipe.cornerDots=[];
    const pts=pipe.absPoints;
    for(let j=1;j<pts.length-1;j++){
      const pp=pts[j];
      const dot=new fabric.Circle({
        left:pp.x,top:pp.y,radius:6,
        fill:'#e53e3e',stroke:'white',strokeWidth:2,
        originX:'center',originY:'center',
        selectable:false,evented:false,
        objectCaching:false,excludeFromExport:true,
        _isCornerDot:true,
      });
      canvas.add(dot);
      pipe.cornerDots.push(dot);
      allCornerDots.push({dot,pipe,ptIdx:j});
    }
  });
  bringOverlaysToFront();
  canvas.requestRenderAll();
}

function exitPipeMode(){
  isPipingMode=false;
  document.getElementById('btn-draw-pipe').style.background='#2b6cb0';
  document.getElementById('btn-draw-pipe').textContent='Draw Pipe';
  startNode=null;
  removePreview();
  canvas.defaultCursor='default';
  canvas.selection=true;
  document.getElementById('snapHint').style.display='none';
  destroyPortDots();
  // Hide corner dots — they only need to be visible in pipe mode
  allCornerDots.forEach(({dot})=>canvas.remove(dot));
  allCornerDots=[];
  pipes.forEach(pipe=>{
    if(pipe.cornerDots)pipe.cornerDots.forEach(d=>canvas.remove(d));
    pipe.cornerDots=[];
  });
  canvas.getObjects().forEach(o=>{if(o.isMachine)o.set({selectable:true,evented:true});});
  canvas.requestRenderAll();
}

function removePreview(){
  if(previewPath){canvas.remove(previewPath);previewPath=null;}
}

function showPreview(pts,pipeData){
  removePreview();
  if(!pts||pts.length<2)return;
  previewPath=makePipePath(pts,pipeData,true);
  canvas.add(previewPath);
  bringOverlaysToFront();
  canvas.requestRenderAll();
}

function inferDir(from,to){
  const dx=to.x-from.x,dy=to.y-from.y;
  if(Math.abs(dx)>Math.abs(dy))return dx>0?'right':'left';
  return dy>0?'bottom':'top';
}

// Opposite direction (for auto-selecting end-direction when snapping to corner)
function oppositeDir(dir){return{top:'bottom',bottom:'top',left:'right',right:'left'}[dir]||'left';}

// ── Update pipes connected to a machine ──
function updateMachinePipes(machine){
  pipes.forEach(pipe=>{
    const pd=pipe.pipeData;
    if(pd.sourceId!==machine.id&&pd.targetId!==machine.id)return;
    const srcM=canvas.getObjects().find(o=>o.isMachine&&o.id===pd.sourceId);
    const tgtM=canvas.getObjects().find(o=>o.isMachine&&o.id===pd.targetId);
    if(!srcM||!tgtM)return;
    const srcPort=getMachinePorts(srcM).find(p=>p.dir===pd.sourceDir);
    const tgtPort=getMachinePorts(tgtM).find(p=>p.dir===pd.targetDir);
    if(!srcPort||!tgtPort)return;
    pipe.absPoints=orthoRoute({x:srcPort.x,y:srcPort.y},pd.sourceDir,{x:tgtPort.x,y:tgtPort.y},pd.targetDir);
    refreshPipeFabric(pipe);
    if(selectedPipe===pipe)refreshPipeHandles(pipe);
    else clearPipeHandles(pipe); // re-add corner dots without handles
    // Re-add corner dots only
    const newPts=pipe.absPoints;
    if(!pipe.cornerDots)pipe.cornerDots=[];
    for(let j=1;j<newPts.length-1;j++){
      const pp=newPts[j];
      const dot=new fabric.Circle({
        left:pp.x,top:pp.y,radius:6,fill:'#e53e3e',stroke:'white',strokeWidth:2,
        originX:'center',originY:'center',selectable:false,evented:false,
        objectCaching:false,excludeFromExport:true,_isCornerDot:true,
      });
      canvas.add(dot);pipe.cornerDots.push(dot);
      allCornerDots.push({dot,pipe,ptIdx:j});
    }
    bringOverlaysToFront();
  });
}

// ═══════════════════════════════════════════════
// CANVAS EVENTS (unified)
// ═══════════════════════════════════════════════
canvas.on('mouse:down',opt=>{
  if(opt.target&&opt.target._isSegHandle)return;
  if(!isPipingMode){
    // Normal: dim click on machine
    if(!opt.target||!opt.target.isMachine)return;
    const obj=opt.target,ptr=canvas.getPointer(opt.e);
    const lp=fabric.util.transformPoint({x:ptr.x,y:ptr.y},fabric.util.invertTransform(obj.calcTransformMatrix()));
    for(let i=2;i<12;i++){
      const dg=obj.item(i);
      if(dg&&dg.isEditable){
        const hw=(dg.width*(dg.scaleX||1))/2+10,hh=(dg.height*(dg.scaleY||1))/2+10;
        if(lp.x>=dg.left-hw&&lp.x<=dg.left+hw&&lp.y>=dg.top-hh&&lp.y<=dg.top+hh){
          const nv=prompt(`New value for ${dg.dimType}:`,obj.compData[dg.dimType]);
          if(nv!==null&&!isNaN(nv)&&parseFloat(nv)>0)updateCompDim(obj,dg.dimType,parseFloat(nv));
          break;
        }
      }
    }
    return;
  }

  // ── Pipe drawing ──
  const ptr=canvas.getPointer(opt.e);
  const snap=nearestSnap(ptr.x,ptr.y);

  if(!startNode){
    if(!snap)return; // must start on a valid snap point
    startNode=snap;
    return;
  }

  // We have a start — try to finish
  if(snap&&(snap.machine!==startNode.machine||snap.isCorner||startNode.isCorner)){
    // Build route
    const endDir=snap.dir||(snap.isCorner?oppositeDir(startNode.dir):inferDir(startNode,snap));
    const pts=orthoRoute(
      {x:startNode.x,y:startNode.y},startNode.dir||inferDir(startNode,snap),
      {x:snap.x,y:snap.y},endDir
    );
    const pType=document.getElementById('pipeType').value;
    const thick=parseInt(document.getElementById('pipeThick').value)||7;
    const pipeRecord={
      absPoints:pts,
      pipeData:{
        type:pType,thick,
        sourceId:startNode.machine?startNode.machine.id:null,
        sourceDir:startNode.dir||null,
        targetId:snap.machine?snap.machine.id:null,
        targetDir:snap.dir||null,
      },
      fabricPath:null,handleObjs:[],cornerDots:[],
    };
    pipes.push(pipeRecord);
    refreshPipeFabric(pipeRecord);
    refreshPipeHandles(pipeRecord);
    removePreview();
    startNode=null;
    saveHist();
    return;
  }

  // Clicked elsewhere — cancel
  removePreview();
  startNode=null;
});

canvas.on('mouse:move',opt=>{
  if(!isPipingMode)return;
  const ptr=canvas.getPointer(opt.e);
  const snap=nearestSnap(ptr.x,ptr.y);
  highlightSnap(snap);

  if(!startNode){canvas.requestRenderAll();return;}

  const endPt=snap?{x:snap.x,y:snap.y}:{x:ptr.x,y:ptr.y};
  const startDir=startNode.dir||inferDir(startNode,endPt);
  const endDir=snap?snap.dir||oppositeDir(startDir):inferDir(startNode,endPt);

  const pType=document.getElementById('pipeType').value;
  const thick=parseInt(document.getElementById('pipeThick').value)||7;
  const pts=orthoRoute({x:startNode.x,y:startNode.y},startDir,endPt,endDir);
  showPreview(pts,{type:pType,thick});

  // Snap hint
  if(snap){
    const rect=canvas.upperCanvasEl.getBoundingClientRect();
    const z=canvas.getZoom(),vpt=canvas.viewportTransform;
    const sx=snap.x*z+vpt[4]+rect.left+10,sy=snap.y*z+vpt[5]+rect.top-26;
    document.getElementById('snapHint').style.cssText=`display:block;left:${sx}px;top:${sy}px;`;
  } else {
    document.getElementById('snapHint').style.display='none';
  }
});

// ═══════════════════════════════════════════════
// DARK MODE
// ═══════════════════════════════════════════════
function toggleDark(){
  isDarkMode=!isDarkMode;
  document.body.classList.toggle('dark-mode',isDarkMode);
  const btn=document.getElementById('btnDark');

  else{btn.style.background='#4a5568';btn.textContent='🌙 Blueprint';canvas.setBackgroundColor('#ffffff',()=>{drawGrid();canvas.renderAll();});}
  redrawRoomDims();updateClusterDims();
}

function adjustCol(hex,p){
  if(!hex||hex[0]!=='#')return hex||'#aaa';
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.min(255,Math.max(0,Math.round(r*(1+p))));g=Math.min(255,Math.max(0,Math.round(g*(1+p))));b=Math.min(255,Math.max(0,Math.round(b*(1+p))));
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}

// HIT AREA
// ═══════════════════════════════════════════════
function applyHitArea(g){
  const d=g.compData,mL=d.L*SC,mW=(d.shapeType==='circle'?d.L:d.W)*SC;
  g.machineHitData={shapeType:d.shapeType,halfW:mL/2,halfH:mW/2,shiftX:((d.lS-d.rS)/2)*SC,shiftY:((d.T-d.B)/2)*SC};
  g.containsPoint=function(pt){
    const lp=fabric.util.transformPoint(pt,fabric.util.invertTransform(this.calcTransformMatrix()));
    const hd=this.machineHitData,lx=lp.x-hd.shiftX,ly=lp.y-hd.shiftY;
    return hd.shapeType==='circle'?(lx*lx+ly*ly<=hd.halfW*hd.halfW):(Math.abs(lx)<=hd.halfW&&Math.abs(ly)<=hd.halfH);
  };
}

// ═══════════════════════════════════════════════
// ALIGN LINES
// ═══════════════════════════════════════════════
function clearAlignLines(){alignLines.forEach(o=>canvas.remove(o));alignLines=[];}
function addAlignLine(x1,y1,x2,y2){
  const l=new fabric.Line([x1,y1,x2,y2],{stroke:'#3182ce',strokeWidth:1.5,strokeDashArray:[5,5],selectable:false,evented:false,excludeFromExport:true});
  canvas.add(l);alignLines.push(l);
}
function smartSnap(obj){
  if(!obj.isMachine)return;
  clearAlignLines();obj.setCoords();
  const aBR=obj.getBoundingRect(true,true);
  const aL=aBR.left,aR=aL+aBR.width,aT=aBR.top,aB=aT+aBR.height,aCX=obj.left,aCY=obj.top;
  let sX=null,sY=null;
  canvas.getObjects().forEach(t=>{
    if(t===obj||!t.isMachine)return;t.setCoords();
    const b=t.getBoundingRect(true,true),tL=b.left,tR=tL+b.width,tT=b.top,tB=tT+b.height,tCX=t.left,tCY=t.top,D=15;
    if(sX===null){
      if(Math.abs(aR-tL)<D){sX=tL-(aR-aCX);addAlignLine(tL,Math.min(aT,tT),tL,Math.max(aB,tB));}
      else if(Math.abs(aL-tR)<D){sX=tR+(aCX-aL);addAlignLine(tR,Math.min(aT,tT),tR,Math.max(aB,tB));}
      else if(Math.abs(aL-tL)<D){sX=tL+(aCX-aL);addAlignLine(tL,Math.min(aT,tT),tL,Math.max(aB,tB));}
      else if(Math.abs(aR-tR)<D){sX=tR-(aR-aCX);addAlignLine(tR,Math.min(aT,tT),tR,Math.max(aB,tB));}
      else if(Math.abs(aCX-tCX)<D){sX=tCX;addAlignLine(tCX,Math.min(aT,tT),tCX,Math.max(aB,tB));}
    }
    if(sY===null){
      if(Math.abs(aB-tT)<D){sY=tT-(aB-aCY);addAlignLine(Math.min(aL,tL),tT,Math.max(aR,tR),tT);}
      else if(Math.abs(aT-tB)<D){sY=tB+(aCY-aT);addAlignLine(Math.min(aL,tL),tB,Math.max(aR,tR),tB);}
      else if(Math.abs(aT-tT)<D){sY=tT+(aCY-aT);addAlignLine(Math.min(aL,tL),tT,Math.max(aR,tR),tT);}
      else if(Math.abs(aB-tB)<D){sY=tB-(aB-aCY);addAlignLine(Math.min(aL,tL),tB,Math.max(aR,tR),tB);}
      else if(Math.abs(aCY-tCY)<D){sY=tCY;addAlignLine(Math.min(aL,tL),tCY,Math.max(aR,tR),tCY);}
    }
  });
  if(sX!==null)obj.left=sX;if(sY!==null)obj.top=sY;obj.setCoords();
}
function rotSnap(obj){
  let a=((obj.angle%360)+360)%360;
  for(const t of[0,90,180,270,360])if(Math.abs(a-t)<SNAP_ROT){obj.rotate(t===360?0:t);break;}
  const inp=document.getElementById(`angle-${obj.id}`);if(inp)inp.value=Math.round(obj.angle%360);
}
function onAngleInput(id,v){const o=components.find(c=>c.id===id);if(o){const a=parseFloat(v);if(!isNaN(a)){o.rotate(a);canvas.renderAll();}}}
function checkCollisions(){
  const m=canvas.getObjects().filter(o=>o.isMachine);
  m.forEach(g=>{g.item(1).set('fill',g.compData.color||DEF_COLOR);g.setCoords();});
  for(let i=0;i<m.length;i++)for(let j=i+1;j<m.length;j++){
    const o1=m[i],o2=m[j],sx=o1.scaleX,sy=o1.scaleY;
    o1.scaleX*=0.99;o1.scaleY*=0.99;o1.setCoords();
    const hit=o1.intersectsWithObject(o2)||o1.isContainedWithinObject(o2)||o2.isContainedWithinObject(o1);
    o1.scaleX=sx;o1.scaleY=sy;o1.setCoords();
    if(hit){o1.item(1).set('fill','rgba(229,62,62,0.5)');o2.item(1).set('fill','rgba(229,62,62,0.5)');}
  }
  canvas.renderAll();
}
function attachMachineEv(group){
  group.on('moving',function(){
    smartSnap(this);
    const b=this.getBoundingRect(true,true),w=b.width,h=b.height;
    if(this.left<w/2)this.left=w/2;if(this.left>canvas.width-w/2)this.left=canvas.width-w/2;
    if(this.top<h/2)this.top=h/2;if(this.top>canvas.height-h/2)this.top=canvas.height-h/2;
    checkCollisions();updateClusterDims();checkLimit();
    updateMachinePipes(this);refreshPortDots();
  });
  group.on('rotating',function(){rotSnap(this);checkCollisions();updateClusterDims();updateMachinePipes(this);refreshPortDots();});
  group.on('mouseup',function(){clearAlignLines();checkCollisions();updateClusterDims();checkLimit();saveHist();});
  group.on('mousedblclick',function(){this.set('angle',0);rotSnap(this);updateMachinePipes(this);canvas.renderAll();});
}

function openImport(){document.getElementById('importModal').classList.add('active');}
function closeImport(){document.getElementById('importModal').classList.remove('active');document.getElementById('importPreview').style.display='none';}
function parseCSV(raw){
  const lines=raw.trim().split('\n').filter(l=>l.trim()),results=[],errors=[];
  lines.forEach((line,i)=>{
    const sep=line.includes('\t')?'\t':line.includes(';')?';':',';
    const parts=line.split(sep).map(s=>s.trim());
    if(parts.length<2){errors.push(`Row ${i+1}: need 2 columns`);return;}
    const model=parts[0],dims=parts[1].replace(/\s/g,'').split('x').map(Number);
    if(dims.some(isNaN)){errors.push(`Row ${i+1}: bad dimension`);return;}
    if(dims.length===2)results.push({name:`${model} (imported)`,model,shape:'circle',L:dims[0],W:dims[0],H:dims[1],T:600,B:600,lS:600,rS:600});
    else if(dims.length===3)results.push({name:`${model} (imported)`,model,shape:'rect',L:dims[0],W:dims[1],H:dims[2],T:800,B:800,lS:800,rS:800});
    else errors.push(`Row ${i+1}: expected 2 or 3 values`);
  });
  return{results,errors};
}
function previewImport(){
  const{results,errors}=parseCSV(document.getElementById('csvInput').value);
  const pv=document.getElementById('importPreview');pv.style.display='block';
  let h=`<div class="preview-row header"><span style="flex:1">Model</span><span style="flex:1">Shape</span><span style="flex:1.5">Dim</span></div>`;
  results.forEach(r=>{h+=`<div class="preview-row"><span style="flex:1">${r.model}</span><span style="flex:1">${r.shape==='circle'?'Round':'Box'}</span><span style="flex:1.5">${r.shape==='circle'?`Ø${r.L}×H${r.H}`:`${r.L}×${r.W}×${r.H}`}</span></div>`;});
  errors.forEach(e=>{h+=`<div class="preview-row preview-error">⚠ ${e}</div>`;});
  pv.innerHTML=h;
}
function confirmImport(){
  const{results,errors}=parseCSV(document.getElementById('csvInput').value);
  if(!results.length){alert('No valid rows.\n'+errors.join('\n'));return;}
  results.forEach(item=>{machineLib.push(item);const sel=document.getElementById('presetSelect'),opt=document.createElement('option');opt.value=machineLib.length-1;opt.text=item.name;sel.appendChild(opt);});
  closeImport();
  setTimeout(()=>alert(`✅ Imported ${results.length} model(s).`+(errors.length?`\n⚠ ${errors.length} skipped.`:'')),80);
}

// ADD COMPRESSOR
// ═══════════════════════════════════════════════
function addCompressor(override=null){
  let shapeType,model,L,W,H,T,B,lS,rS,color;
  if(override){({shapeType,model,L,W,H,T,B,lS,rS}=override);color=override.color||DEF_COLOR;}
  else{
    shapeType=document.getElementById('compShape').value;model=document.getElementById('compModel').value;
    L=parseFloat(document.getElementById('compL').value);
    W=shapeType==='rect'?parseFloat(document.getElementById('compW').value):L;
    H=parseFloat(document.getElementById('compH').value)||1000;
    T=parseFloat(document.getElementById('sT').value);B=parseFloat(document.getElementById('sB').value);
    lS=parseFloat(document.getElementById('sL').value);rS=parseFloat(document.getElementById('sR').value);
    color=DEF_COLOR;
  }
  const mL=L*SC,mW=W*SC,objs=[];
  const spacing=new fabric.Rect({width:(L+lS+rS)*SC,height:(W+T+B)*SC,fill:'rgba(56,161,105,0.06)',stroke:'#38a169',strokeDashArray:[4,4],originX:'center',originY:'center',left:0,top:0});
  objs.push(spacing);
  const sx=((lS-rS)/2)*SC,sy=((T-B)/2)*SC;
  const shadow=new fabric.Rect({width:mL+4,height:(shapeType==='circle'?mL:mW)+4,fill:'rgba(0,0,0,0.10)',rx:3,ry:3,originX:'center',originY:'center',left:sx+3,top:sy+4,selectable:false,evented:false});
  objs.push(shadow);
  let machine;
  if(shapeType==='circle')machine=new fabric.Circle({radius:mL/2,fill:color,stroke:'#555',strokeWidth:1.5,originX:'center',originY:'center',left:sx,top:sy});
  else machine=new fabric.Rect({width:mL,height:mW,fill:color,stroke:'#555',strokeWidth:1.5,originX:'center',originY:'center',left:sx,top:sy});
  objs.push(machine);
  if(shapeType==='circle'){
    const d=drawDim(L,false,'#333',true,'L');d.set({left:sx,top:sy,originX:'center',originY:'center'});objs.push(d);
  } else {
    const td=drawDim(L,false,'#333',true,'L');td.set({left:machine.left,top:machine.top-(mW/2+25),originX:'center'});
    const ld=drawDim(W,true,'#333',true,'W');ld.set({left:machine.left-(mL/2+25),top:machine.top,originY:'center'});
    objs.push(td,ld);
  }
  const sT2=drawSpacing(T,true,'#38a169',true,'T');sT2.set({left:machine.left,top:machine.top-(mW/2)-(T*SC/2),originX:'center',originY:'center'});
  const sB2=drawSpacing(B,true,'#38a169',true,'B');sB2.set({left:machine.left,top:machine.top+(mW/2)+(B*SC/2),originX:'center',originY:'center'});
  const sL2=drawSpacing(lS,false,'#38a169',true,'lS');sL2.set({left:machine.left-(mL/2)-(lS*SC/2),top:machine.top,originX:'center',originY:'center'});
  const sR2=drawSpacing(rS,false,'#38a169',true,'rS');sR2.set({left:machine.left+(mL/2)+(rS*SC/2),top:machine.top,originX:'center',originY:'center'});
  objs.push(sT2,sB2,sL2,sR2);
  const lbl=new fabric.Text(model||'',{fontSize:11,fontWeight:'bold',left:machine.left,top:machine.top,originX:'center',originY:'center',fill:'#1a202c'});
  objs.push(lbl);
  const uid=override?override.id:('id_'+Date.now()+'_'+Math.random().toString(36).slice(2));
  const group=new fabric.Group(objs,{left:canvas.width/2,top:canvas.height/2,originX:'center',originY:'center',lockScalingX:true,lockScalingY:true,isMachine:true,compData:{model,L,W,H:H||1000,T,B,lS,rS,shapeType,color},width:spacing.width,height:spacing.height});
  group.id=uid;
  group.setControlsVisibility({mt:false,mb:false,ml:false,mr:false,bl:false,br:false,tl:false,tr:false});
  applyHitArea(group);attachMachineEv(group);
  canvas.add(group);
  if(!override){addToList(group);canvas.setActiveObject(group);}
  canvas.renderAll();checkLimit();
  return group;
}
function addToList(group){
  const d=group.compData,list=document.getElementById('componentList');
  const item=document.createElement('li');item.className='component-item';item.id=`comp-${group.id}`;
  const cc=d.color||DEF_COLOR,isC=d.shapeType==='circle';
  const mi=(k,v)=>`<input type="number" value="${v}" class="mini-input" onchange="onListChange('${group.id}','${k}',this.value)">`;
  const sizeRow=isC?`<div class="detail-row"><span class="detail-label">Dia:</span>${mi('L',d.L)}</div>`:`<div class="detail-row"><span class="detail-label">L×W:</span><div style="display:flex;gap:4px;">${mi('L',d.L)}×${mi('W',d.W)}</div></div>`;
  item.innerHTML=`<div class="component-header"><span>${d.model||'Custom'}</span><input type="color" value="${cc}" style="width:22px;height:22px;border:none;background:none;cursor:pointer;padding:0;" onchange="onListChange('${group.id}','color',this.value)"></div>
  <div class="component-details">${sizeRow}
  <div class="detail-row"><span class="detail-label">H:</span>${mi('H',d.H||1000)}</div>
  <div class="detail-row"><span class="detail-label">Angle°:</span><input type="number" id="angle-${group.id}" class="angle-input" value="${Math.round(group.angle)}" onchange="onAngleInput('${group.id}',this.value)"></div>
  <div style="margin-top:4px;border-top:1px dashed var(--border);padding-top:4px;">
  <span style="font-size:9px;font-weight:bold;color:var(--subtext);display:block;margin-bottom:3px;">CLEARANCE (mm)</span>
  <div class="detail-row"><span class="detail-label">T/B:</span><div style="display:flex;gap:3px;">${mi('T',d.T)}${mi('B',d.B)}</div></div>

function deleteSelected(){
  const act=canvas.getActiveObjects();if(!act.length)return;

      const pipe=obj._pipe;
      clearPipeHandles(pipe);

      pipes=pipes.filter(p=>p!==pipe);

function doUndo(){
  if(hist.length<=1)return;
  undoing=true;hist.pop();
  const state=JSON.parse(hist[hist.length-1]);
  canvas.getObjects().filter(o=>o.isMachine).forEach(o=>canvas.remove(o));
  pipes.forEach(p=>{clearPipeHandles(p);if(p.fabricPath)canvas.remove(p.fabricPath);});
  document.getElementById('componentList').innerHTML='';
  components=[];pipes=[];allCornerDots=[];selectedPipe=null;
  Promise.all(state.machines.map(od=>new Promise(res=>{
    fabric.util.enlivenObjects([od],([obj])=>{
      if(!obj){res();return;}
      obj.setControlsVisibility({mt:false,mb:false,ml:false,mr:false,bl:false,br:false,tl:false,tr:false});
      obj.set({lockScalingX:true,lockScalingY:true});
      applyHitArea(obj);attachMachineEv(obj);
      canvas.add(obj);components.push(obj);addToList(obj);res();
    });
  }))).then(()=>{
    state.pipes.forEach(pr=>{
      const rec={absPoints:pr.absPoints,pipeData:pr.pipeData,fabricPath:null,handleObjs:[],cornerDots:[]};
      pipes.push(rec);refreshPipeFabric(rec);
      // Restore corner dots (no handles unless selected)
      const pts=rec.absPoints;
      for(let j=1;j<pts.length-1;j++){
        const pp=pts[j];
        const dot=new fabric.Circle({left:pp.x,top:pp.y,radius:6,fill:'#e53e3e',stroke:'white',strokeWidth:2,originX:'center',originY:'center',selectable:false,evented:false,objectCaching:false,excludeFromExport:true,_isCornerDot:true});

function drawElev(){
  const ctx=viewCtx,cw=viewCvs.width,ch=viewCvs.height;
  ctx.clearRect(0,0,cw,ch);ctx.fillStyle='#f7faff';ctx.fillRect(0,0,cw,ch);
  const machines=canvas.getObjects().filter(o=>o.isMachine).sort((a,b)=>a.left-b.left);
  if(!machines.length)return;
  const maxH=Math.max(...machines.map(m=>m.compData.H||1000));
  const totalW=machines.reduce((s,m)=>s+m.compData.L+m.compData.lS+m.compData.rS,0);
  const PAD=60,FLOOR=ch-PAD,sc=Math.min((FLOOR-PAD)/maxH,(cw-PAD*2)/Math.max(totalW,1));
  ctx.strokeStyle='#e0e8f0';ctx.lineWidth=0.5;
  for(let x=PAD;x<cw-PAD;x+=500*sc){ctx.beginPath();ctx.moveTo(x,PAD);ctx.lineTo(x,FLOOR);ctx.stroke();}
  for(let y=FLOOR;y>PAD;y-=500*sc){ctx.beginPath();ctx.moveTo(PAD,y);ctx.lineTo(cw-PAD,y);ctx.stroke();}
  ctx.strokeStyle='#2d3748';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(PAD-10,FLOOR);ctx.lineTo(cw-PAD+10,FLOOR);ctx.stroke();
  ctx.fillStyle='#2d3748';ctx.font='bold 11px Segoe UI';ctx.textAlign='center';ctx.fillText('FLOOR LEVEL',cw/2,FLOOR+20);
  let curX=PAD;
  const cols=['#e8edf2','#e8f0e8','#f0e8e8','#e8ecf0','#f0ece8','#ece8f0'];
  machines.forEach((m,i)=>{
    const d=m.compData,L=d.L||0,H=d.H||1000,lS=d.lS||0,rS=d.rS||0;
    const hPx=H*sc,mPx=L*sc,bx=curX+lS*sc,by=FLOOR-hPx;
    ctx.fillStyle='rgba(56,161,105,0.07)';ctx.fillRect(curX,FLOOR-hPx,lS*sc,hPx);ctx.fillRect(bx+mPx,FLOOR-hPx,rS*sc,hPx);
    ctx.setLineDash([4,4]);ctx.strokeStyle='#38a169';ctx.lineWidth=1;ctx.strokeRect(curX,FLOOR-hPx,(L+lS+rS)*sc,hPx);ctx.setLineDash([]);
    ctx.fillStyle=cols[i%cols.length];ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.fillRect(bx,by,mPx,hPx);ctx.strokeRect(bx,by,mPx,hPx);
    ctx.fillStyle='#1a202c';ctx.font=`bold ${Math.min(13,mPx/Math.max(d.model.length,1)*1.4)}px Segoe UI`;ctx.textAlign='center';ctx.fillText(d.model||'',bx+mPx/2,by+hPx/2+4);
    const dX=bx+mPx+rS*sc+8;
    ctx.strokeStyle='#e53e3e';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(dX,FLOOR);ctx.lineTo(dX,by);ctx.stroke();
    ctx.save();ctx.translate(dX+14,FLOOR-hPx/2);ctx.rotate(-Math.PI/2);ctx.fillStyle='#e53e3e';ctx.font='bold 10px Segoe UI';ctx.textAlign='center';ctx.fillText(`H:${H}`,0,0);ctx.restore();
    curX+=(L+lS+rS)*sc;
  });
  ctx.fillStyle='#1a202c';ctx.font='bold 14px Segoe UI';ctx.textAlign='left';ctx.fillText('ELEVATION VIEW',PAD,PAD-8);
}
function initIsoEv(){
  viewCvs.onmousedown=e=>{if(currentTab!=='iso')return;iso.drag=true;iso.lx=e.clientX;iso.ly=e.clientY;iso.mode=e.shiftKey?'pan':'orbit';viewCvs.style.cursor='grabbing';};
  viewCvs.onmousemove=e=>{
    if(!iso.drag||currentTab!=='iso')return;
    const dx=e.clientX-iso.lx,dy=e.clientY-iso.ly;iso.lx=e.clientX;iso.ly=e.clientY;
    if(iso.mode==='orbit'){iso.az-=dx*.008;iso.el=Math.max(.05,Math.min(Math.PI/2.1,iso.el-dy*.007));}
    else{iso.panX+=dx;iso.panY+=dy;}
    drawIso();
  };
  viewCvs.onmouseup=viewCvs.onmouseleave=()=>{iso.drag=false;viewCvs.style.cursor=currentTab==='iso'?'grab':'default';};
  viewCvs.onwheel=e=>{if(currentTab!=='iso')return;e.preventDefault();iso.zoom=Math.max(.2,Math.min(5,iso.zoom*(e.deltaY>0?.92:1.09)));drawIso();};

function resetIso(){iso.az=Math.PI/4;iso.el=Math.PI/5;iso.zoom=1;iso.panX=0;iso.panY=0;drawIso();}

function drawIso(){
  const ctx=viewCtx,cw=viewCvs.width,ch=viewCvs.height;
  ctx.clearRect(0,0,cw,ch);
  const bg=ctx.createLinearGradient(0,0,0,ch);
  bg.addColorStop(0,isDarkMode?'#0a1628':'#f0f4f8');bg.addColorStop(1,isDarkMode?'#060c1a':'#d9e2ec');
  ctx.fillStyle=bg;ctx.fillRect(0,0,cw,ch);
  const machines=canvas.getObjects().filter(o=>o.isMachine);
  if(!machines.length)return;
  const mmS=1/SC;
  let mnX=Infinity,mnY=Infinity,mxX=-Infinity,mxY=-Infinity;
  machines.forEach(m=>{
    const d=m.compData,wx=m.left*mmS,wy=m.top*mmS,hw=d.L/2,hh=(d.shapeType==='circle'?d.L:d.W)/2;
    [wx-hw,wx+hw].forEach(x=>{if(x<mnX)mnX=x;if(x>mxX)mxX=x;});
    [wy-hh,wy+hh].forEach(y=>{if(y<mnY)mnY=y;if(y>mxY)mxY=y;});
  });
  if(mnX===Infinity){mnX=0;mnY=0;mxX=5000;mxY=5000;}
  const maxH=Math.max(...machines.map(m=>m.compData.H||1000),500);
  const cx2=(mnX+mxX)/2,cy2=(mnY+mxY)/2,span=Math.max(mxX-mnX,mxY-mnY,maxH*2);
  const bSc=Math.min(cw-120,ch-120)/span*.55*iso.zoom;
  const az=iso.az,el=iso.el,cAz=Math.cos(az),sAz=Math.sin(az),cEl=Math.cos(el),sEl=Math.sin(el);
  const proj=(wx,wy,wz)=>{const x=wx-cx2,y=wy-cy2,rx=x*cAz-y*sAz,ry=x*sAz+y*cAz;return{x:cw/2+rx*bSc+iso.panX,y:ch/2+(ry*sEl-wz*cEl)*bSc+iso.panY};};
  const gMm=1000,gx0=Math.floor(mnX/gMm)*gMm,gy0=Math.floor(mnY/gMm)*gMm,gx1=Math.ceil(mxX/gMm)*gMm,gy1=Math.ceil(mxY/gMm)*gMm;
  ctx.strokeStyle=isDarkMode?'rgba(100,160,255,0.18)':'rgba(100,130,160,0.22)';ctx.lineWidth=.8;
  for(let gx=gx0;gx<=gx1;gx+=gMm){const p1=proj(gx,gy0,0),p2=proj(gx,gy1,0);ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();}
  for(let gy=gy0;gy<=gy1;gy+=gMm){const p1=proj(gx0,gy,0),p2=proj(gx1,gy,0);ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();}
  const avgMachH=machines.reduce((s,m)=>s+(m.compData.H||1000),0)/machines.length;
  const items=[];
  machines.forEach(m=>{const wx=m.left*mmS,wy=m.top*mmS;items.push({type:'machine',obj:m,depth:wx*sAz+wy*cAz});});
  pipes.forEach(pipe=>{
    const pts=pipe.absPoints;if(!pts||!pts.length)return;
    const cx=pts.reduce((s,p)=>s+p.x,0)/pts.length*mmS,cy=pts.reduce((s,p)=>s+p.y,0)/pts.length*mmS;
    items.push({type:'pipe',obj:pipe,depth:cx*sAz+cy*cAz});
  });
  items.sort((a,b)=>a.depth-b.depth);
  items.forEach(item=>{
    if(item.type==='machine'){
      const m=item.obj,d=m.compData,H=d.H||1000,isRound=d.shapeType==='circle',mS=1/SC;
      const color=d.color||DEF_COLOR,cTop=adjustCol(color,.22),cFront=adjustCol(color,0),cSide=adjustCol(color,-.20);
      if(isRound){
        const mcx=m.left*mS,mcy=m.top*mS,R=d.L/2,segs=32,pT=[],pB=[];
        for(let i=0;i<=segs;i++){const th=(i/segs)*2*Math.PI;pT.push(proj(mcx+R*Math.cos(th),mcy+R*Math.sin(th),H));pB.push(proj(mcx+R*Math.cos(th),mcy+R*Math.sin(th),0));}
        for(let i=0;i<segs;i++){
          const p1=pT[i],p2=pT[i+1],b1=pB[i],b2=pB[i+1];
          if((p2.x-p1.x)*(b1.y-p1.y)-(p2.y-p1.y)*(b1.x-p1.x)<0){
            ctx.fillStyle=adjustCol(color,Math.cos((i/segs)*2*Math.PI-az-Math.PI/4)*.3);ctx.strokeStyle=ctx.fillStyle;ctx.lineWidth=.5;
            ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.lineTo(b2.x,b2.y);ctx.lineTo(b1.x,b1.y);ctx.fill();ctx.stroke();
          }
        }
        ctx.fillStyle=cTop;ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=.5;ctx.beginPath();pT.forEach(p=>ctx.lineTo(p.x,p.y));ctx.fill();ctx.stroke();
        const cS=proj(mcx,mcy,H);ctx.fillStyle=isDarkMode?'white':'#1a202c';ctx.font='bold 10px Segoe UI';ctx.textAlign='center';ctx.fillText(d.model||'',cS.x,cS.y);
      } else {
        const mcx=m.left*mS,mcy=m.top*mS,ang=m.angle*Math.PI/180,cA=Math.cos(ang),sA=Math.sin(ang),hw=d.L/2,hh=d.W/2;
        const cor=[[-hw,-hh],[hw,-hh],[hw,hh],[-hw,hh]].map(([x,y])=>({x:mcx+x*cA-y*sA,y:mcy+x*sA+y*cA}));
        const t=cor.map(c=>proj(c.x,c.y,H)),b=cor.map(c=>proj(c.x,c.y,0));
        ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=.8;
        [[0,1],[1,2],[2,3],[3,0]].forEach(([i1,i2])=>{
          const area=(t[i2].x-t[i1].x)*(b[i2].y-t[i1].y)-(t[i2].y-t[i1].y)*(b[i2].x-t[i1].x);
          if(area<0){ctx.fillStyle=[0,1].includes(i1)?cFront:cSide;ctx.beginPath();ctx.moveTo(t[i1].x,t[i1].y);ctx.lineTo(t[i2].x,t[i2].y);ctx.lineTo(b[i2].x,b[i2].y);ctx.lineTo(b[i1].x,b[i1].y);ctx.fill();ctx.stroke();}
        });
        ctx.fillStyle=cTop;ctx.beginPath();t.forEach(p=>ctx.lineTo(p.x,p.y));ctx.fill();ctx.stroke();
        const cX=(t[0].x+t[2].x)/2,cY=(t[0].y+t[2].y)/2;
        ctx.fillStyle=isDarkMode?'white':'#1a202c';ctx.font='bold 10px Segoe UI';ctx.textAlign='center';ctx.fillText(d.model||'',cX,cY);
      }
    } else if(item.type==='pipe'){
      // Isometric: draw pipe at fixed elevation, no vertical legs
      const pipe=item.obj,pd=pipe.pipeData,pc=PIPE_COLORS[pd.type]||PIPE_COLORS.air;
      const thick=pd.thick||7,pipeZ=avgMachH*0.72,pts=pipe.absPoints||[];
      if(pts.length<2)return;
      for(let ei=0;ei<pts.length-1;ei++){
        const sp=pts[ei],ep=pts[ei+1];
        const p1=proj(sp.x*mmS,sp.y*mmS,pipeZ),p2=proj(ep.x*mmS,ep.y*mmS,pipeZ);
        // Pipe body at elevation
        ctx.strokeStyle=pc.s;ctx.lineWidth=thick;ctx.lineCap='round';
        ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();
        // Highlight
        ctx.strokeStyle=pc.h;ctx.lineWidth=thick*.35;
        ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();
      }
      // End-caps
      [pts[0],pts[pts.length-1]].forEach(pp=>{
        const pproj=proj(pp.x*mmS,pp.y*mmS,pipeZ);
        ctx.beginPath();ctx.arc(pproj.x,pproj.y,(thick||7)*.7,0,Math.PI*2);
        ctx.fillStyle=adjustCol(pc.s,-.25);ctx.fill();
        ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=.8;ctx.stroke();
      });
    }
  });
  ctx.fillStyle='rgba(26,32,44,0.8)';ctx.fillRect(10,10,265,52);
  ctx.fillStyle='white';ctx.font='bold 12px Segoe UI';ctx.textAlign='left';ctx.textBaseline='top';ctx.fillText('ISOMETRIC VIEW (3D)',18,18);
  ctx.fillStyle='#a0aec0';ctx.font='10px Segoe UI';ctx.fillText('Drag: orbit  |  Shift+Drag: pan  |  Scroll: zoom',18,36);
  ctx.fillStyle='rgba(49,130,206,0.85)';ctx.fillRect(cw-90,10,80,28);
  ctx.fillStyle='white';ctx.font='bold 10px Segoe UI';ctx.textAlign='center';ctx.fillText('⟳ Reset View',cw-50,24);
  viewCvs._rb={x:cw-90,y:10,w:80,h:28};
}

    doc.setFontSize(7);doc.setFont('helvetica','normal');doc.text('SHEET CONTENT',bX+47,bY+4);doc.setFont('helvetica','bold');fit(pageTitle,bX+47,bY+10,43,10);
    doc.setFontSize(7);doc.setFont('helvetica','normal');doc.text('DATE / REF',bX+47,bY+18);
    doc.setFontSize(9);doc.text(`${new Date().toLocaleDateString()}  |  ${ref}`,bX+47,bY+24);
  };
  const addImg=(img,w,h)=>{const dW=W-20,dH=H-20,ratio=Math.min(dW/w,dH/h),fW=w*ratio,fH=h*ratio;doc.addImage(img,'PNG',(W-fW)/2,(H-fH)/2,fW,fH);};
  // Hide overlays for export
  pipes.forEach(p=>{if(p.handleObjs)p.handleObjs.forEach(h=>h.set('visible',false));if(p.cornerDots)p.cornerDots.forEach(d=>d.set('visible',false));});
  portDots.forEach(d=>d.set('visible',false));
  const wasDark=isDarkMode;
  if(wasDark){isDarkMode=false;document.body.classList.remove('dark-mode');canvas.setBackgroundColor('#ffffff',()=>{drawGrid();canvas.renderAll();});}
  const wasGrid=gridVisible;if(wasGrid){gridVisible=false;drawGrid();}
  canvas.discardActiveObject().renderAll();
  await new Promise(r=>setTimeout(r,80));
  addImg(canvas.toDataURL({format:'png',multiplier:2}),canvas.getWidth(),canvas.getHeight());
  drawTB('FLOOR PLAN (2D)');
  if(wasGrid){gridVisible=true;drawGrid();}
  if(wasDark){isDarkMode=true;document.body.classList.add('dark-mode');canvas.setBackgroundColor('#0d1a35',()=>{drawGrid();canvas.renderAll();});}
  // Restore overlays
  pipes.forEach(p=>{if(p.handleObjs)p.handleObjs.forEach(h=>h.set('visible',true));if(p.cornerDots)p.cornerDots.forEach(d=>d.set('visible',true));});
  portDots.forEach(d=>d.set('visible',true));
  canvas.renderAll();
  if(!viewCvs){viewCvs=document.getElementById('viewCanvas');viewCtx=viewCvs.getContext('2d');}
  const ow=viewCvs.width,oh=viewCvs.height;viewCvs.width=1920;viewCvs.height=1080;
  const wd=isDarkMode;isDarkMode=false;
  drawElev();doc.addPage();addImg(viewCvs.toDataURL('image/png'),1920,1080);drawTB('ELEVATION VIEW');
  drawIso();doc.addPage();addImg(viewCvs.toDataURL('image/png'),1920,1080);drawTB('ISOMETRIC VIEW');
  isDarkMode=wd;viewCvs.width=ow;viewCvs.height=oh;
  if(document.getElementById('viewsModal').classList.contains('active'))renderTab();
  doc.save(`${ref}_Layout_Set.pdf`);
}

saveHist();
